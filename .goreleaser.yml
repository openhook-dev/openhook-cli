version: 2

project_name: openhook

before:
  hooks:
    - go mod tidy

builds:
  - id: openhook
    main: ./cmd/openhook
    binary: openhook
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}

archives:
  - id: default
    format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - Merge pull request
      - Merge branch

brews:
  - name: openhook
    repository:
      owner: openhook-dev
      name: homebrew-openhook
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Formula
    homepage: "https://openhook.dev"
    description: "Webhook relay service for AI agents - receive events from GitHub, Stripe, Linear"
    license: "MIT"
    test: |
      system "#{bin}/openhook", "--help"
    install: |
      bin.install "openhook"

release:
  github:
    owner: openhook-dev
    name: openhook-cli
  draft: false
  prerelease: auto
  name_template: "v{{.Version}}"
