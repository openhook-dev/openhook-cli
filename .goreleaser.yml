version: 2

project_name: openhook

before:
  hooks:
    - go mod tidy

builds:
  - id: openhook
    main: ./cmd/openhook
    binary: openhook
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/openhook-dev/openhook-cli/internal/cli.Version={{.Version}}

archives:
  - id: default
    format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - Merge pull request
      - Merge branch

brews:
  - name: openhook
    repository:
      owner: openhook-dev
      name: homebrew-openhook
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Formula
    homepage: "https://openhook.dev"
    description: "Event routing and channels for AI agents"
    license: "MIT"
    test: |
      system "#{bin}/openhook", "--help"
    install: |
      bin.install "openhook"

nfpms:
  - id: openhook
    package_name: openhook
    vendor: openhook-dev
    homepage: "https://openhook.dev"
    maintainer: "openhook <hello@openhook.dev>"
    description: "Event routing and channels for AI agents - receive webhooks from GitHub, Stripe, Linear and coordinate agent workflows"
    license: "MIT"
    formats:
      - deb
      - rpm
    bindir: /usr/bin

release:
  github:
    owner: openhook-dev
    name: openhook-cli
  draft: false
  prerelease: auto
  name_template: "v{{.Version}}"
